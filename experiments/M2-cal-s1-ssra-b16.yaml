# M2 Phase 1 calibration measurement run (launch-flow assignment §5 step 3;
# M2-assignment §4 Phase 1 + §5 configs). Purpose: measured tok/s + peak VRAM
# for the S1 (tuning, ~24M params) config, arch=ssra, batch 16, bf16 autocast (AP-16).
# SHORT MEASUREMENT RUN ONLY - no quality conclusions (spec §16).
# 2026-07-12 amendment (committed before the kill+resume launch): this config
# replaces M2-cal-s1-ssra-b32 as the AP-11 GPU kill+resume vehicle - b32 OOMs
# on the A100 80GB (readout gather; see results/M2-calibration.md), so ckpt
# settings moved here. First (measurement) launch used ckpt_every: 0; its logs
# are preserved as logs/M2-cal-s1-ssra-b16-measurement.*.
arch: ssra
run_name: M2-cal-s1-ssra-b16
model:
  d: 384
  h: 6
  n_layers: 10
  n_max: 32768             # e_l table headroom for M3 length extrapolation (assignment §5)
  m: 16
  w: 64
  pool: p1
  tied_embeddings: true    # AP-9: 16k tied
data:
  train_bin: data/phase0/train.bin
  val_bin: data/phase0/val.bin
  vocab: 16384
training:
  steps: 120
  batch_size: 16
  seq_len: 1024            # train ctx per M2-assignment §5
  lr: 3.0e-4
  warmup_steps: 20
  weight_decay: 0.01
  lr_min_frac: 0.1
  seed: 1337
  device: cuda
  precision: bf16          # AP-16
  val_every: 10000         # > steps: val only at step 0 and the final step
  val_batches: 4
  log_every: 10
  ckpt_dir: checkpoints/M2-cal-s1-ssra-b16
  ckpt_every: 30
  gcs_ckpt_dir: gs://ssra-poc-ew3/m2/calibration/ckpt/M2-cal-s1-ssra-b16
