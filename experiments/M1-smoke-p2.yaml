# M1 smoke run (assignment §5): functionality only, no quality conclusions.
# SSRA-P2 control pool (spec §5.2).
arch: ssra
run_name: M1-smoke-p2
model:
  d: 256
  h: 8
  n_layers: 5
  n_max: 512
  pool: p2
p3:
  grad: ste
  tau_start: 2.0
  tau_end: 0.5
  tau_anneal_steps: 1000
  lambda_lb: 0.01
data:
  url: https://raw.githubusercontent.com/karpathy/char-rnn/master/data/tinyshakespeare/input.txt
  val_frac: 0.1
training:
  steps: 2000
  batch_size: 4
  seq_len: 512
  lr: 3.0e-4
  warmup_steps: 100
  weight_decay: 0.01
  seed: 1337
  device: mps
  val_every: 250
  val_batches: 8
  log_every: 50
