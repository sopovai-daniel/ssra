# M1 smoke run (assignment §5): functionality only, no quality conclusions.
# Baseline (c) MEGABYTE-style 2-level, short smoke per AP-5.
arch: megabyte
run_name: M1-smoke-megabyte
model:
  d: 256
  h: 8
  n_layers: 5
  n_max: 512
  pool: p1
p3:
  grad: ste
  tau_start: 2.0
  tau_end: 0.5
  tau_anneal_steps: 1000
  lambda_lb: 0.01
data:
  url: https://raw.githubusercontent.com/karpathy/char-rnn/master/data/tinyshakespeare/input.txt
  val_frac: 0.1
training:
  steps: 2000
  batch_size: 4
  seq_len: 512
  lr: 3.0e-4
  warmup_steps: 100
  weight_decay: 0.01
  seed: 1337
  device: mps
  val_every: 250
  val_batches: 8
  log_every: 50
