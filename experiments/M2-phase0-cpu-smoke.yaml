# M2 Phase-0 CPU smoke (assignment Phase 0): exercises the tokenized data path
# + checkpoint/resume end-to-end on the FineWeb-Edu shard. FUNCTIONALITY ONLY,
# no quality conclusions (spec §16, assignment §8). Not a GPU run; not S1/S2.
# Pool = P1 only (assignment §3). Contingency flags off.
arch: ssra
run_name: M2-phase0-cpu-smoke
model:
  d: 128
  h: 4
  n_layers: 3
  n_max: 2048
  m: 16
  w: 64
  pool: p1
  tied_embeddings: true   # AP-9: 16k tied
p3:
  grad: ste
  tau_start: 2.0
  tau_end: 0.5
  tau_anneal_steps: 1000
  lambda_lb: 0.01
data:
  train_bin: data/phase0/train.bin
  val_bin: data/phase0/val.bin
  vocab: 16384
training:
  steps: 60
  batch_size: 4
  seq_len: 256
  lr: 3.0e-4
  warmup_steps: 10
  weight_decay: 0.01
  lr_min_frac: 0.1
  seed: 1337
  device: cpu
  precision: fp32          # CPU smoke is fp32; bf16 autocast (AP-16) is GPU-only
  val_every: 20
  val_batches: 4
  log_every: 10
  ckpt_dir: checkpoints/M2-phase0-cpu-smoke
  ckpt_every: 30           # also exercises the AP-11 checkpoint path at smoke scale
